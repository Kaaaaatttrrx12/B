<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">

    <title>bebby Payment</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            /* ปรับพื้นหลังเป็นโทนสีพาสเทลตามรูปภาพ */
            background: linear-gradient(135deg, #fce7f3 0%, #e0e7ff 50%, #fae8ff 100%);
            background-attachment: fixed;
        }
        .bounce-hover:hover {
            transform: translateY(-2px);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.9);
        }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pastel: {
                            pink: '#fbcfe8',
                            purple: '#e9d5ff',
                            blue: '#bfdbfe',
                            dark: '#9d174d', /* สีตัวหนังสือหลัก */
                            text: '#be185d'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center py-10 px-4 text-pastel-dark relative overflow-x-hidden w-full">

    <div id="toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 bg-pink-400 text-white px-6 py-3 rounded-full shadow-lg transition-all duration-300 opacity-0 -translate-y-4 pointer-events-none z-50 flex items-center gap-2 font-medium text-sm border-2 border-white">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        คัดลอกสำเร็จ
    </div>

    <div class="w-full max-w-[500px] md:max-w-[650px] relative z-10">
        
        <div class="relative z-10 mb-6 flex items-center justify-center gap-2 text-pink-600 drop-shadow-sm">
            <span class="text-3xl">🧸</span>
            <h1 class="text-3xl md:text-4xl font-bold tracking-wide">
                bebby Payment
            </h1>
        </div>

        <svg class="absolute -top-2 -left-4 w-6 h-6 text-pink-300 rotate-12 animate-pulse" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <svg class="absolute top-1/4 -right-4 w-5 h-5 text-purple-300 animate-bounce" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>

        <div class="glass-card p-3 rounded-[32px] shadow-lg relative z-10 mb-6">
            <img src="ไม่มีชื่อ 763_20260408114649.jpeg" alt="บัญชี bebby" class="w-full h-auto object-cover rounded-[24px]" onerror="this.src='https://placehold.co/600x600/fbcfe8/be185d?text=bebby+Payment'">
        </div>

        <div class="glass-card px-6 pb-10 pt-8 rounded-[32px] shadow-lg relative z-10">
            
            <div class="space-y-6 relative z-10">
                <div class="text-center space-y-4">
                    <p class="text-[16px] md:text-[18px] leading-relaxed font-medium text-pink-700">
                        เลขบัญชีตามนี้เลยนะคะ
                        <br>ชื่อบัญชี <span class="font-bold text-pink-500 text-[18px] md:text-[20px] bg-pink-100 px-2 py-0.5 rounded-lg">เกศิณี</span> เท่านั้นน้า!!
                        <br><span class="text-[14px] md:text-[15px] text-pink-500 font-normal mt-2 block">ไม่มีบัญชีอื่นค่ะ สามารถ Save รูปไปสแกนได้เลยนะคะ</span>
                    </p>
                    
                    <div class="bg-gradient-to-r from-pink-50 to-purple-50 text-pink-600 rounded-2xl p-4 text-[14px] md:text-[16px] inline-flex items-center gap-2 border border-pink-200 shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 text-pink-400">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z" />
                        </svg>
                        <div class="font-medium">
                            โอนแล้วอย่าลืมแปะสลิป
                        </div>
                    </div>
                </div>

                <div class="space-y-4 pt-4 border-t-2 border-dashed border-pink-200">
                    <div class="flex items-center justify-center gap-2 text-[14px] md:text-[16px] text-pink-500 mb-4 font-medium">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 animate-bounce text-pink-400">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                        </svg>
                        จิ้มปุ่มเพื่อคัดลอกเลขบัญชีได้เลย
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 animate-bounce text-pink-400">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                        </svg>
                    </div>

                    <div class="bg-white/80 rounded-[20px] p-3 md:p-4 flex items-center justify-between border-2 border-green-100 shadow-sm transition-all hover:border-green-300 relative">
                        <div class="flex items-center gap-3 md:gap-4">
                            <div class="w-12 h-12 bg-green-50 rounded-full flex items-center justify-center text-green-500 font-bold text-xl border border-green-200 shadow-sm">
                                K+
                            </div>
                            <div>
                                <div class="text-[12px] md:text-[14px] text-pink-500 font-medium mb-0.5">กสิกรไทย (เกศิณี)</div>
                                <div class="font-bold tracking-wider text-green-600 text-lg md:text-xl">086-1-81927-2</div>
                            </div>
                        </div>
                        <button onclick="copyText('0861819272', this)" class="bounce-hover bg-pink-100 hover:bg-pink-200 text-pink-600 text-[13px] md:text-[14px] font-semibold px-4 md:px-5 py-2.5 rounded-full transition-colors flex items-center gap-1 border border-pink-200 whitespace-nowrap flex-shrink-0 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                            คัดลอก
                        </button>
                    </div>

                    <div class="bg-white/80 rounded-[20px] p-3 md:p-4 flex items-center justify-between border-2 border-orange-100 shadow-sm transition-all hover:border-orange-300 relative">
                        <div class="flex items-center gap-3 md:gap-4">
                            <div class="w-12 h-12 bg-orange-50 rounded-full flex items-center justify-center text-orange-500 font-bold text-xl border border-orange-200 shadow-sm">
                                W
                            </div>
                            <div>
                                <div class="text-[12px] md:text-[14px] text-pink-500 font-medium mb-0.5">วอเลท (ภานุกร)</div>
                                <div class="font-bold tracking-wider text-orange-500 text-lg md:text-xl">064-146-2832</div>
                            </div>
                        </div>
                        <button onclick="copyText('0641462832', this)" class="bounce-hover bg-pink-100 hover:bg-pink-200 text-pink-600 text-[13px] md:text-[14px] font-semibold px-4 md:px-5 py-2.5 rounded-full transition-colors flex items-center gap-1 border border-pink-200 whitespace-nowrap flex-shrink-0 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                            คัดลอก
                        </button>
                    </div>
                    
                    <div class="text-center text-[13px] md:text-[14px] text-pink-600 font-medium mt-4 bg-white/50 py-2 rounded-xl">
                        * ทรูมันนี่วอเลทไม่มี + เพิ่ม *
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        function copyText(text, buttonElement) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            textArea.style.top = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                document.execCommand('copy');
                
                showToast();

                const originalHtml = buttonElement.innerHTML;
                const originalClass = buttonElement.className;
                
                buttonElement.innerHTML = '✔ คัดลอกแล้ว';
                buttonElement.classList.add('opacity-70', 'scale-95');
                
                setTimeout(() => {
                    buttonElement.innerHTML = originalHtml;
                    buttonElement.className = originalClass;
                }, 2000);

            } catch (err) {
                console.error('ไม่สามารถคัดลอกได้:', err);
            }

            document.body.removeChild(textArea);
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', '-translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', '-translate-y-4');
            }, 2500);
        }
    </script>
</body>
</html>
